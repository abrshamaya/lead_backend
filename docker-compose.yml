
services:
  db:
    image: postgres:15-alpine
    container_name: lead_postgres
    environment:
      POSTGRES_USER: lead_user
      POSTGRES_PASSWORD: lead_pass
      POSTGRES_DB: lead_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # optional, for direct host access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_user -d lead_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    container_name: lead_backend
    build: ./AmayaLead
    command: sh -c "python manage.py migrate && (python manage.py collectstatic --noinput || echo 'collectstatic failed — admin static files may be missing') && gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 AmayaLead.wsgi"
    ports:
      - "8000:8000"
    volumes:
      - ./AmayaLead:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./AmayaLead/.env
    environment:
      DJANGO_ENV: prod
      POSTGRES_USER: lead_user
      POSTGRES_PASSWORD: lead_pass
      POSTGRES_DB: lead_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    restart: unless-stopped

  scraper:
    container_name: lead_scraper
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8001"
    build: ./FastAPI
    ports:
      - "8001:8001"
    env_file:
      - ./FastAPI/.env
    restart: unless-stopped

  qcluster:
    container_name: lead_cluster
    command: sh -c "python manage.py qcluster"
    build: ./AmayaLead
    volumes:
      - ./AmayaLead:/app
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      scraper:
        condition: service_started
    env_file:
      - ./AmayaLead/.env
    environment:
      DJANGO_ENV: prod
      POSTGRES_USER: lead_user
      POSTGRES_PASSWORD: lead_pass
      POSTGRES_DB: lead_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    restart: unless-stopped


volumes:
  postgres_data:
