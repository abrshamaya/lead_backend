<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f5;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f4f4f5;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;margin:0 auto;background:#ffffff;border:1px solid #e6e8eb;border-radius:10px;overflow:hidden;">

        <!-- Logo header -->
        {% if logo_url %}
        <tr>
          <td style="padding:22px 32px 12px;text-align:center;">
            <img src="{{ logo_url }}" alt="{{ company_name }}" width="190" style="display:inline-block;border:0;max-width:190px;height:auto;">
          </td>
        </tr>
        {% endif %}
        <tr><td style="height:4px;line-height:4px;font-size:0;background:#174275;">&nbsp;</td></tr>

        <!-- Message body -->
        <tr>
          <td style="padding:28px 32px;color:#2c2c2c;font-size:15px;line-height:1.6;">
            {{ message_html|safe }}
          </td>
        </tr>

        <!-- Inline images (chat attachments) -->
        {% if images %}
        <tr>
          <td style="padding:0 32px 12px;">
            {% for img in images %}
            <img src="{{ img }}" alt="" style="display:block;max-width:100%;height:auto;border-radius:8px;margin:0 0 10px 0;border:1px solid #e6e8eb;">
            {% endfor %}
          </td>
        </tr>
        {% endif %}

        <!-- Footer / signature -->
        <tr>
          <td style="padding:18px 32px;background:#f7f9fb;border-top:1px solid #e6e8eb;color:#6b7280;font-size:12px;line-height:1.5;">
            <strong style="color:#174275;">{{ company_name }}</strong><br>
            {{ company_address }}<br>
            Phone: <a href="tel:{{ phone }}" style="color:#174275;text-decoration:none;">{{ phone }}</a> ·
            Email: <a href="mailto:{{ email }}" style="color:#174275;text-decoration:none;">{{ email }}</a>
            {% if unsubscribe_url %}<br><a href="{{ unsubscribe_url }}" style="color:#9ca3af;text-decoration:underline;">Unsubscribe</a>{% endif %}
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
