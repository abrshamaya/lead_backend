# Minimal host nginx vhost for remedylead.app.
# Start with plain HTTP — `certbot --nginx` adds the TLS / 443 blocks for you.
#
#   sudo cp deploy/nginx/remedylead.app.conf /etc/nginx/sites-available/remedylead.app
#   sudo ln -s /etc/nginx/sites-available/remedylead.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d remedylead.app -d www.remedylead.app

# Maps the Connection header for WebSocket upgrades:
#   "upgrade" when the client sent Upgrade, "" (close) otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name remedylead.app www.remedylead.app;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
